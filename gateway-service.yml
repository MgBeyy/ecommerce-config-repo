# Ortak Ayarlar
server:
  port: 8080
jwt:
  secret: ${JWT_SECRET} # .env dosyasından Config Server aracılığıyla veya environment variable olarak gelecek
---
# Dev Profili
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - AuthenticationFilter # Özel JWT doğrulama filtremiz
        - id: basket-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/basket/**
          filters:
            - AuthenticationFilter
        # Order ve Payment için benzer route'lar...
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
---
# Docker Profili
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: catalog-service
          uri: http://catalog-service:8082
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - AuthenticationFilter
        - id: basket-service
          uri: http://basket-service:8083
          predicates:
            - Path=/api/v1/basket/**
          filters:
            - AuthenticationFilter
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/