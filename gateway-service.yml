# Ortak Ayarlar
server:
  port: 8080
jwt:
  secret: ${JWT_SECRET} # .env dosyasından Config Server aracılığıyla veya environment variable olarak gelecek

springdoc:
  swagger-ui:
    urls:
      - name: Product Service
        url: /api/v1/products/v3/api-docs
---
# Dev Profili
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      webmvc:
        routes:
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/v1/auth/**
          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
---
# Docker Profili
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      webmvc:
        routes:
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/v1/auth/**
          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/