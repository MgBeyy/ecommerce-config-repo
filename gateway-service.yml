# Ortak Ayarlar
server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.servlet.DispatcherServlet: DEBUG

jwt:
  secret: ${JWT_SECRET} # .env dosyasından Config Server aracılığıyla veya environment variable olarak gelecek

springdoc:
  api-docs:
    path: /gateway-v3-api-docs # Gateway'in kendi api-docs yolunu degistirerek cakisicak yollari onledik.
  swagger-ui:
    urls:
      - name: Product Service
        url: /docs/product-service/
---
# Dev Profili
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      webmvc:
        routes:
          - id: product-service-docs
            uri: lb://product-service
            predicates:
              - Path=/docs/product-service/**
            filters:
              - RewritePath=/docs/product-service(?<segment>.*), /v3/api-docs${segment}
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/v1/auth/**
          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
---
# Docker Profili
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      webmvc:
        routes:
          - id: product-service-docs
            uri: lb://product-service
            predicates:
              - Path=/docs/product-service/**
            filters:
              - RewritePath=/docs/product-service(?<segment>.*), /v3/api-docs${segment}
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/v1/auth/**
          - id: product-service
            uri: lb://product-service
            predicates:
              - Path=/api/v1/products/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/