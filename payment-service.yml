# Ortak Ayarlar
server:
  port: 8084

spring:
  application:
    name: payment-service

---
# Dev Profili (Yerel Geliştirme)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres # .env üzerinden ezilecek
    password: password # .env üzerinden ezilecek
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
# Docker Profili
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-server:5432/payment_db # Docker Compose'daki DB servis adı
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update # MVP aşamasında update kalabilir. Sonrasında Flyway/Liquibase'e geçilmeli.
    show-sql: false
  rabbitmq:
    host: rabbitmq-server # Docker Compose'daki RabbitMQ servis adı
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true