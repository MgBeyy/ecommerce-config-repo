# Ortak Ayarlar
server:
  port: 8081
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 1 gün (milisaniye)

---
# Dev Profili
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
# Docker Profili
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/auth_db
    username: ${DB_USER}
    password: ${DB_PASS}
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/